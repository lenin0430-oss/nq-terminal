<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NQ Terminal — Nasdaq Futures</title>
<style>
  :root {
    --bg: #0d0f14;
    --panel: #13161e;
    --border: #1e2330;
    --green: #00ff88;
    --red: #ff4466;
    --yellow: #ffcc00;
    --blue: #4488ff;
    --cyan: #00ccff;
    --orange: #ff8800;
    --text: #c8d0e0;
    --dim: #5a6480;
    --header-bg: #0a0c12;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', monospace;
    font-size: 13px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* TOP BAR */
  .topbar {
    background: var(--header-bg);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-left { display: flex; align-items: center; gap: 16px; }
  .logo { color: var(--green); font-size: 16px; font-weight: bold; letter-spacing: 2px; }
  .logo span { color: var(--cyan); }
  .badge {
    background: rgba(0,255,136,0.1);
    border: 1px solid var(--green);
    color: var(--green);
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 10px;
    letter-spacing: 1px;
  }
  .badge.red { background: rgba(255,68,102,0.1); border-color: var(--red); color: var(--red); }
  .topbar-right { color: var(--dim); font-size: 11px; }
  .live-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    margin-right: 5px;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* MAIN GRID */
  .main { padding: 16px 20px; max-width: 1400px; margin: 0 auto; }

  /* DATE HEADER */
  .date-header {
    text-align: center;
    padding: 20px 0 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .date-header h1 { color: var(--cyan); font-size: 20px; letter-spacing: 3px; text-transform: uppercase; }
  .date-header p { color: var(--dim); font-size: 11px; margin-top: 4px; letter-spacing: 1px; }

  /* MARKET STRIP */
  .market-strip {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .ticker-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 16px;
    flex: 1;
    min-width: 150px;
  }
  .ticker-card .label { color: var(--dim); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; }
  .ticker-card .value { font-size: 20px; font-weight: bold; margin: 4px 0; }
  .ticker-card .change { font-size: 12px; }
  .green { color: var(--green); }
  .red { color: var(--red); }
  .yellow { color: var(--yellow); }
  .cyan { color: var(--cyan); }
  .orange { color: var(--orange); }
  .dim { color: var(--dim); }
